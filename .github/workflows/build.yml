name: Build

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.mvn_version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: zulu

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Extract Maven version
        id: mvn_version
        run: |
          set -o pipefail
          VERSION="$(mvn -B help:evaluate -Dexpression=project.version -q -DforceStdout | head -n 1 | tr -d '\r' | tr ':/' '-')"
          [ -n "$VERSION" ] || { echo "ERROR: could not extract project version"; exit 1; }
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Build and test
        run: mvn -B package

      # Locate the shaded fat JAR (exclude the *-original.jar that Shade leaves behind)
      - name: Locate fat JAR
        id: locate
        run: |
          JAR=$(find jpipe-cli/target -name "jpipe-cli-*.jar" ! -name "*-original.jar" -type f)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"

      # Always upload the fat JAR as a per-run artifact (available on the Actions run page)
      - name: Upload fat JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: jpipe-cli-${{ steps.mvn_version.outputs.version }}.jar
          path: ${{ steps.locate.outputs.path }}
          archive: false
          if-no-files-found: error


  release:
    name: Publish unstable release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download fat JAR artifact
        uses: actions/download-artifact@v7
        with:
          name: jpipe-cli-${{ needs.build.outputs.version }}.jar
          path: dist

      - name: Publish unstable release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          JAR_FILE="dist/jpipe-cli-${VERSION}.jar"
          [ -f "$JAR_FILE" ] || { echo "ERROR: $JAR_FILE not found"; find dist -maxdepth 2 || echo "dist dir missing"; exit 1; }
          cp "$JAR_FILE" jpipe-cli.jar

          # Re-point the unstable tag to this commit
          git tag -f unstable
          git push origin unstable --force

          # Delete the existing pre-release (ignore error if it does not exist yet)
          gh release delete unstable --yes 2>/dev/null || true

          gh release create unstable jpipe-cli.jar \
            --title "Unstable build ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes $'This pre-release is rebuilt on every push to `main`.\n\nIt tracks the latest code and is **not intended for production use**.' \
            --prerelease \
            --target "$GITHUB_SHA"
