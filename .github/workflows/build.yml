name: Build

on:
  push:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: zulu

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build and test
        run: mvn -B package

      # Locate the shaded fat JAR (exclude the *-original.jar that Shade leaves behind)
      - name: Locate fat JAR
        run: |
          JAR=$(find jpipe-cli/target -name "jpipe-cli-*.jar" ! -name "*-original.jar" -type f)
          echo "FAT_JAR=$JAR" >> "$GITHUB_ENV"

      # Always upload the fat JAR as a per-run artifact (available on the Actions run page)
      - name: Upload fat JAR artifact
        uses: actions/upload-artifact@v7
        with:
          name: jpipe-cli-${{ github.sha }}
          path: ${{ env.FAT_JAR }}
          archive: false
          if-no-files-found: error

      # On pushes to master: update the rolling "unstable" pre-release so that
      # anyone can download the latest build without logging in to GitHub.
      - name: Publish unstable release
        if: github.ref == 'refs/heads/master' && github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp "$FAT_JAR" jpipe-cli.jar

          # Re-point the unstable tag to this commit
          git tag -f unstable
          git push origin unstable --force

          # Delete the existing pre-release (ignore error if it does not exist yet)
          gh release delete unstable --yes 2>/dev/null || true

          gh release create unstable jpipe-cli.jar \
            --title "Unstable build ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes $'This pre-release is rebuilt on every push to `master`.\n\nIt tracks the latest code and is **not intended for production use**.' \
            --prerelease \
            --target "$GITHUB_SHA"
