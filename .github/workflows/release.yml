name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build-and-release:
    name: Build and publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256: ${{ steps.sha256.outputs.sha256 }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: zulu

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches pom.xml version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          POM_VER=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout | sed 's/-SNAPSHOT//')
          if [ "$VERSION" != "$POM_VER" ]; then
            echo "ERROR: tag v$VERSION does not match pom.xml version $POM_VER (expected $VERSION)"
            exit 1
          fi

      - name: Set release version in pom.xml
        run: mvn -B versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

      - name: Build fat JAR
        run: mvn -B package -DskipTests

      - name: Locate fat JAR
        id: locate
        run: |
          JAR=$(find jpipe-cli/target -name "jpipe-cli-*.jar" ! -name "*-original.jar" -type f)
          echo "path=$JAR" >> "$GITHUB_OUTPUT"

      - name: Assemble Homebrew tarball
        id: tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist/jpipe-$VERSION
          cp "${{ steps.locate.outputs.path }}" dist/jpipe-$VERSION/jpipe.jar
          cp homebrew/jpipe dist/jpipe-$VERSION/jpipe
          tar -czf dist/jpipe-$VERSION.tar.gz -C dist jpipe-$VERSION
          echo "path=dist/jpipe-$VERSION.tar.gz" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        id: sha256
        run: |
          SHA=$(sha256sum "${{ steps.tarball.outputs.path }}" | awk '{print $1}')
          echo "sha256=$SHA" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release create "v$VERSION" \
            --title "jPipe v$VERSION" \
            --generate-notes \
            "${{ steps.tarball.outputs.path }}" \
            "${{ steps.locate.outputs.path }}"

  update-homebrew:
    name: Update Homebrew formula
    runs-on: ubuntu-latest
    needs: build-and-release

    steps:
      - name: Checkout Homebrew tap
        uses: actions/checkout@v6
        with:
          repository: jpipe-mcscert/homebrew-mcscert
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update jpipe.rb
        run: |
          VERSION="${{ needs.build-and-release.outputs.version }}"
          SHA256="${{ needs.build-and-release.outputs.sha256 }}"
          URL="https://github.com/jpipe-mcscert/jpipe-compiler/releases/download/v${VERSION}/jpipe-${VERSION}.tar.gz"

          sed -i "s|url \".*\"|url \"${URL}\"|" tap/jpipe.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" tap/jpipe.rb
          sed -i "s|openjdk@[0-9]*|openjdk@25|g" tap/jpipe.rb

      - name: Commit and push
        run: |
          VERSION="${{ needs.build-and-release.outputs.version }}"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: bump jpipe to v${VERSION}"
          git push

  publish-ppa:
    name: Publish to Ubuntu PPA (${{ matrix.distro }})
    runs-on: ubuntu-latest
    needs: build-and-release
    strategy:
      matrix:
        distro: [focal, jammy, noble, questing]

    steps:
      - uses: actions/checkout@v6

      - name: Install Debian packaging tools
        run: sudo apt-get install -y devscripts debhelper dput gnupg

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "$GPG_KEY_ID:6:" | gpg --import-ownertrust
          # Configure agent for non-interactive signing and pre-cache the passphrase
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpg-connect-agent reloadagent /bye
          echo "$GPG_PASSPHRASE" | gpg --batch --pinentry-mode loopback --passphrase-fd 0 \
            --sign --output /dev/null /dev/null

      - name: Download fat JAR from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ needs.build-and-release.outputs.version }}"
          gh release download "v${VERSION}" \
            --pattern "jpipe-cli-${VERSION}.jar" \
            --output jpipe.jar

      - name: Generate debian/changelog for this release
        run: |
          VERSION="${{ needs.build-and-release.outputs.version }}"
          dch --newversion "${VERSION}-1" \
              --distribution ${{ matrix.distro }} \
              --force-distribution \
              "Release v${VERSION}."

      - name: Build Debian source package
        env:
          DEBEMAIL: mossers@mcmaster.ca
          DEBFULLNAME: jPipe Team
          GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
        run: |
          dpkg-buildpackage -S -sa --sign-key="$GPG_KEY_ID"

      - name: Upload to Launchpad PPA
        run: |
          VERSION="${{ needs.build-and-release.outputs.version }}"
          dput ppa:mcscert/ppa ../jpipe_${VERSION}-1_source.changes
